<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sunset Board</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Sunset Board">
<link rel="apple-touch-icon" href="logo.png">
<link rel="icon" type="image/png" href="logo.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blast-bg: #FAECE7; --blast-text: #712B13; --blast-border: #F0997B;
    --prep-bg: #E6F1FB; --prep-text: #0C447C; --prep-border: #85B7EB;
    --coat-bg: #EAF3DE; --coat-text: #27500A; --coat-border: #97C459;
    --status-ns-bg: #F1EFE8; --status-ns-text: #444441;
    --status-ip-bg: #FAEEDA; --status-ip-text: #633806;
    --status-done-bg: #E1F5EE; --status-done-text: #085041;
    --status-rp-bg: #EEEDFE; --status-rp-text: #3C3489;
    --bg: #f5f5f3; --surface: #ffffff; --border: #e0e0dc;
    --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;
    --teal: #1D9E75; --teal-dark: #0F6E56;
    --radius: 10px; --radius-sm: 6px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; position: sticky; top: 0; z-index: 50; }
  .header-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .logo { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; }
  .logo span { color: var(--teal); }
  .week-nav { display: flex; align-items: center; gap: 4px; }
  .week-nav button { width: 30px; height: 30px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--text2); }
  .week-label { font-size: 12px; color: var(--text2); white-space: nowrap; min-width: 110px; text-align: center; }
  .today-btn { padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); font-size: 12px; cursor: pointer; color: var(--text2); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .sync-dot.live { background: var(--teal); }
  .sync-dot.error { background: #E24B4A; }
  .add-btn { padding: 7px 14px; background: var(--teal); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .add-btn:hover { background: var(--teal-dark); }
  .view-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 12px; display: flex; align-items: center; gap: 8px; justify-content: space-between; }
  .view-toggle { display: flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .view-btn { padding: 5px 14px; background: var(--surface); border: none; font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; border-right: 1px solid var(--border); }
  .view-btn:last-child { border-right: none; }
  .view-btn.active { background: var(--teal); color: #fff; }
  .day-nav { display: none; align-items: center; gap: 8px; }
  .day-nav.visible { display: flex; }
  .day-nav button { width: 30px; height: 30px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); cursor: pointer; font-size: 15px; color: var(--text2); display: flex; align-items: center; justify-content: center; }
  .day-nav span { font-size: 13px; font-weight: 600; color: var(--text); min-width: 100px; text-align: center; }
  .legend { padding: 6px 12px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; background: var(--surface); border-bottom: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text2); }
  .legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
  .board-wrap { overflow-x: auto; padding: 12px; -webkit-overflow-scrolling: touch; }
  .board { display: grid; gap: 8px; }
  .board.view-1 { grid-template-columns: 1fr; max-width: 600px; margin: 0 auto; }
  .board.view-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); min-width: 480px; }
  .board.view-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); min-width: 800px; }
  .day-col { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .day-header { padding: 8px 10px 6px; border-bottom: 1px solid var(--border); }
  .day-name { font-weight: 700; font-size: 13px; }
  .day-date { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .day-col.today .day-header { background: #E1F5EE; }
  .day-col.today .day-name { color: var(--teal-dark); }
  .process-grid { display: grid; grid-template-columns: repeat(3, 1fr); }
  .process-col { border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .process-col:last-child { border-right: none; }
  .process-header { padding: 4px 2px; text-align: center; font-size: 9px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .process-header.blast { background: var(--blast-bg); color: var(--blast-text); }
  .process-header.prep { background: var(--prep-bg); color: var(--prep-text); }
  .process-header.coat { background: var(--coat-bg); color: var(--coat-text); }
  .slots { padding: 5px 3px; display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .slot { border: 1.5px dashed var(--border); border-radius: var(--radius-sm); min-height: 68px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s, background 0.15s; }
  .slot:hover { border-color: var(--teal); background: #f0faf6; }
  .slot.drag-over { border-color: var(--teal); background: #E1F5EE; }
  .slot.occupied { border: none; cursor: default; padding: 0; background: none; }
  .slot.occupied:hover { background: none; }
  .slot-plus { font-size: 16px; color: var(--border); }
  /* ADD SLOT BUTTON */
  .add-slot-btn { margin: 0 3px 5px; padding: 4px; border: 1px dashed var(--border); border-radius: var(--radius-sm); background: none; cursor: pointer; font-size: 10px; color: var(--text3); text-align: center; width: calc(100% - 6px); transition: border-color 0.15s, color 0.15s; }
  .add-slot-btn:hover { border-color: var(--teal); color: var(--teal); }
  /* REMOVE SLOT BUTTON */
  .remove-slot-btn { display: block; margin: 0 3px 2px; padding: 2px; background: none; border: none; cursor: pointer; font-size: 9px; color: var(--text3); text-align: center; width: calc(100% - 6px); }
  .remove-slot-btn:hover { color: #A32D2D; }
  .job-card { width: 100%; border-radius: var(--radius-sm); padding: 6px 7px; cursor: pointer; }
  .job-card.blast { background: var(--blast-bg); border: 1px solid var(--blast-border); }
  .job-card.prep { background: var(--prep-bg); border: 1px solid var(--prep-border); }
  .job-card.coat { background: var(--coat-bg); border: 1px solid var(--coat-border); }
  .job-card.dragging { opacity: 0.4; }
  .card-customer { font-size: 11px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-customer.blast { color: var(--blast-text); }
  .card-customer.prep { color: var(--prep-text); }
  .card-customer.coat { color: var(--coat-text); }
  .card-desc { font-size: 10px; color: var(--text2); margin-top: 2px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.3; }
  .card-color { font-size: 10px; color: var(--text3); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .status-btn { margin-top: 4px; display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 20px; border: none; cursor: pointer; font-weight: 600; }
  .status-btn.not-started { background: var(--status-ns-bg); color: var(--status-ns-text); }
  .status-btn.in-progress { background: var(--status-ip-bg); color: var(--status-ip-text); }
  .status-btn.done { background: var(--status-done-bg); color: var(--status-done-text); }
  .status-btn.ready-pickup { background: var(--status-rp-bg); color: var(--status-rp-text); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; font-weight: 600; }
  .field input, .field select, .field textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text); }
  .field textarea { resize: vertical; min-height: 60px; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--teal); }
  .process-select { display: flex; gap: 6px; }
  .process-opt { flex: 1; padding: 7px 4px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; }
  .process-opt.selected.blast { border-color: var(--blast-border); background: var(--blast-bg); color: var(--blast-text); }
  .process-opt.selected.prep { border-color: var(--prep-border); background: var(--prep-bg); color: var(--prep-text); }
  .process-opt.selected.coat { border-color: var(--coat-border); background: var(--coat-bg); color: var(--coat-text); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; flex-wrap: wrap; }
  .btn-del { padding: 8px 14px; border: 1px solid #E24B4A; background: none; color: #A32D2D; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; margin-right: auto; }
  .btn-cancel { padding: 8px 14px; border: 1px solid var(--border); background: none; color: var(--text2); border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; }
  .btn-save { padding: 8px 18px; background: var(--teal); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; }
  .setup { max-width: 460px; margin: 40px auto; padding: 28px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); }
  .setup h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .setup p { color: var(--text2); font-size: 13px; line-height: 1.6; margin-bottom: 16px; }
  .setup .step { background: var(--bg); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 10px; }
  .setup .step h3 { font-size: 13px; font-weight: 700; margin-bottom: 5px; }
  .setup input[type=text] { width: 100%; padding: 9px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; margin-bottom: 8px; }
  .setup .btn-connect { width: 100%; padding: 11px; background: var(--teal); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; }
  .setup .note { font-size: 11px; color: var(--text3); margin-top: 12px; }
</style>
</head>
<body>

<div id="setup-screen" style="display:none; padding: 16px;">
  <div class="setup">
    <h1>Connect Firebase</h1>
    <p>Enter your Firebase config to sync in real time across all devices.</p>
    <div class="step">
      <h3>Enter your config</h3>
      <input type="text" id="cfg-apiKey" placeholder="apiKey">
      <input type="text" id="cfg-authDomain" placeholder="authDomain">
      <input type="text" id="cfg-dbUrl" placeholder="databaseURL">
      <input type="text" id="cfg-projectId" placeholder="projectId">
      <button class="btn-connect" onclick="saveConfig()">Connect &amp; open board</button>
    </div>
    <p class="note">Config saves in this browser. Enter once per device.</p>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="header">
    <div class="header-left">
      <div class="logo">Sunset <span>Board</span></div>
      <div class="week-nav">
        <button onclick="changeWeek(-1)">&#8249;</button>
        <span class="week-label" id="week-label"></span>
        <button onclick="changeWeek(1)">&#8250;</button>
      </div>
      <button class="today-btn" onclick="goToday()">Today</button>
    </div>
    <div class="header-right">
      <div class="sync-dot" id="sync-dot"></div>
      <button class="add-btn" onclick="openModal()">+ Add job</button>
    </div>
  </div>

  <div class="view-bar">
    <div class="view-toggle">
      <button class="view-btn" id="vbtn-1" onclick="setView(1)">1 day</button>
      <button class="view-btn" id="vbtn-3" onclick="setView(3)">3 days</button>
      <button class="view-btn active" id="vbtn-5" onclick="setView(5)">Week</button>
    </div>
    <div class="day-nav" id="day-nav">
      <button onclick="changeDay(-1)">&#8249;</button>
      <span id="day-nav-label"></span>
      <button onclick="changeDay(1)">&#8250;</button>
    </div>
  </div>

  <div class="legend">
    <span style="font-size:11px;color:var(--text3);font-weight:600;">Process:</span>
    <div class="legend-item"><div class="legend-dot" style="background:var(--blast-bg);border:1px solid var(--blast-border);"></div>Blast</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--prep-bg);border:1px solid var(--prep-border);"></div>Prep</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--coat-bg);border:1px solid var(--coat-border);"></div>Coat</div>
    <span style="font-size:11px;color:var(--text3);font-weight:600;margin-left:6px;">Status:</span>
    <div class="legend-item"><div class="legend-dot" style="background:var(--status-ns-bg);"></div>Not started</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--status-ip-bg);"></div>In progress</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--status-done-bg);"></div>Done</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--status-rp-bg);"></div>Pickup</div>
  </div>

  <div class="board-wrap">
    <div class="board view-5" id="board"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal">
    <h2 id="modal-title">Add job</h2>
    <div class="field"><label>Customer name *</label><input type="text" id="f-customer" placeholder="e.g. Apex Welding"></div>
    <div class="field"><label>Item description</label><textarea id="f-desc" placeholder="e.g. 4 trailer frames, remove old powder"></textarea></div>
    <div class="field"><label>Color / finish</label><input type="text" id="f-color" placeholder="e.g. Matte Black"></div>
    <div class="field">
      <label>Process step</label>
      <div class="process-select">
        <div class="process-opt blast" id="opt-blast" onclick="selectProcess('blast')">Blast</div>
        <div class="process-opt prep" id="opt-prep" onclick="selectProcess('prep')">Prep</div>
        <div class="process-opt coat" id="opt-coat" onclick="selectProcess('coat')">Coat</div>
      </div>
    </div>
    <div class="field"><label>Status</label>
      <select id="f-status">
        <option value="not-started">Not started</option>
        <option value="in-progress">In progress</option>
        <option value="done">Done</option>
        <option value="ready-pickup">Ready for pickup</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="field"><label>Day</label>
        <select id="f-day">
          <option value="0">Monday</option><option value="1">Tuesday</option>
          <option value="2">Wednesday</option><option value="3">Thursday</option><option value="4">Friday</option>
        </select>
      </div>
      <div class="field"><label>Slot</label>
        <select id="f-slot"></select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-del" id="btn-del" onclick="deleteJob()" style="display:none;">Delete</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveJob()">Save</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const DAYS_SHORT = ['Mon','Tue','Wed','Thu','Fri'];
const PROCESSES = ['blast','prep','coat'];
const DEFAULT_SLOTS = 6;
const STATUSES = ['not-started','in-progress','done','ready-pickup'];
const STATUS_LABELS = {'not-started':'Not started','in-progress':'In progress','done':'Done','ready-pickup':'Ready for pickup'};

let db = null, weekOffset = 0, currentView = 5, currentDayOffset = 0;
let jobs = {}, slotCounts = {}, editingId = null, selectedProcess = 'coat', dragId = null;

function getConfig() { try { return JSON.parse(localStorage.getItem('sunset_fb_config') || 'null'); } catch(e) { return null; } }

function saveConfig() {
  const cfg = { apiKey: document.getElementById('cfg-apiKey').value.trim(), authDomain: document.getElementById('cfg-authDomain').value.trim(), databaseURL: document.getElementById('cfg-dbUrl').value.trim(), projectId: document.getElementById('cfg-projectId').value.trim() };
  if (!cfg.apiKey || !cfg.databaseURL) { alert('apiKey and databaseURL are required.'); return; }
  localStorage.setItem('sunset_fb_config', JSON.stringify(cfg));
  initApp(cfg);
}

function initApp(cfg) {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  if (!firebase.apps.length) firebase.initializeApp(cfg);
  db = firebase.database();
  db.ref('.info/connected').on('value', snap => { document.getElementById('sync-dot').className = 'sync-dot ' + (snap.val() ? 'live' : 'error'); });
  db.ref('jobs').on('value', snap => { jobs = snap.val() || {}; render(); });
  db.ref('slotCounts').on('value', snap => { slotCounts = snap.val() || {}; render(); });
  const today = new Date().getDay();
  currentDayOffset = (today >= 1 && today <= 5) ? today - 1 : 0;
  if (window.innerWidth < 500) setView(1);
  else if (window.innerWidth < 850) setView(3);
  else setView(5);
}

function getMondayOf(offset) {
  const now = new Date(), day = now.getDay(), diff = day === 0 ? -6 : 1 - day, mon = new Date(now);
  mon.setDate(now.getDate() + diff + offset * 7); mon.setHours(0,0,0,0); return mon;
}

function fmtDate(d) { return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
function isToday(d) { const t = new Date(); return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear(); }
function weekKey() { return getMondayOf(weekOffset).toISOString().slice(0,10); }
function slotKey(di, proc) { return weekKey() + '_' + di + '_' + proc; }
function getSlotCount(di, proc) { return (slotCounts[slotKey(di, proc)] || DEFAULT_SLOTS); }

function addSlot(di, proc) {
  const key = slotKey(di, proc);
  const current = getSlotCount(di, proc);
  db.ref('slotCounts/' + key).set(current + 1);
}

function removeSlot(di, proc) {
  const key = slotKey(di, proc);
  const current = getSlotCount(di, proc);
  if (current <= 1) return;
  // Check if last slot is occupied
  const lastSlot = current - 1;
  const occupied = Object.values(jobs).some(j => j.week===weekKey() && j.day===di && j.process===proc && j.slot===lastSlot);
  if (occupied) { alert('Move or delete the job in the last slot before removing it.'); return; }
  db.ref('slotCounts/' + key).set(current - 1);
}

function changeWeek(d) { weekOffset += d; render(); }
function goToday() { weekOffset = 0; const t = new Date().getDay(); currentDayOffset = (t>=1&&t<=5)?t-1:0; render(); }

function setView(v) {
  currentView = v;
  [1,3,5].forEach(n => document.getElementById('vbtn-'+n).classList.toggle('active', n===v));
  document.getElementById('day-nav').classList.toggle('visible', v===1);
  render();
}

function changeDay(d) { currentDayOffset = Math.max(0, Math.min(4, currentDayOffset + d)); render(); }

function getDaysToShow() {
  if (currentView === 1) return [currentDayOffset];
  if (currentView === 3) { const s = Math.min(currentDayOffset, 2); return [s, s+1, s+2]; }
  return [0,1,2,3,4];
}

function render() {
  const mon = getMondayOf(weekOffset), fri = new Date(mon);
  fri.setDate(mon.getDate() + 4);
  document.getElementById('week-label').textContent = fmtDate(mon) + ' – ' + fmtDate(fri);
  const daysToShow = getDaysToShow();
  if (currentView === 1) {
    const d = new Date(mon); d.setDate(mon.getDate() + currentDayOffset);
    document.getElementById('day-nav-label').textContent = DAYS_SHORT[currentDayOffset] + ', ' + fmtDate(d);
  }
  const board = document.getElementById('board');
  board.className = 'board view-' + currentView;
  board.innerHTML = '';

  daysToShow.forEach(di => {
    const colDate = new Date(mon); colDate.setDate(mon.getDate() + di);
    const col = document.createElement('div');
    col.className = 'day-col' + (isToday(colDate) ? ' today' : '');
    col.innerHTML = '<div class="day-header"><div class="day-name">' + DAYS[di] + '</div><div class="day-date">' + fmtDate(colDate) + '</div></div>';
    const grid = document.createElement('div');
    grid.className = 'process-grid';

    PROCESSES.forEach(proc => {
      const numSlots = getSlotCount(di, proc);
      const pcol = document.createElement('div');
      pcol.className = 'process-col';

      const ph = document.createElement('div');
      ph.className = 'process-header ' + proc;
      ph.textContent = proc.charAt(0).toUpperCase() + proc.slice(1);
      pcol.appendChild(ph);

      const slotsEl = document.createElement('div');
      slotsEl.className = 'slots';

      for (let s = 0; s < numSlots; s++) {
        const slot = document.createElement('div');
        const existing = Object.entries(jobs).find(([id, j]) => j.week===weekKey() && j.day===di && j.process===proc && j.slot===s);
        if (existing) {
          slot.className = 'slot occupied';
          slot.appendChild(makeCard(existing[0], existing[1]));
        } else {
          slot.className = 'slot';
          slot.innerHTML = '<span class="slot-plus">+</span>';
          slot.onclick = () => openModal(di, proc, s);
          slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('drag-over'); });
          slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
          slot.addEventListener('drop', e => { e.preventDefault(); slot.classList.remove('drag-over'); if (dragId && jobs[dragId]) db.ref('jobs/'+dragId).update({day:di,process:proc,slot:s,week:weekKey()}); });
        }
        slotsEl.appendChild(slot);
      }
      pcol.appendChild(slotsEl);

      // Remove slot button (only if > 1 slot)
      if (numSlots > 1) {
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-slot-btn';
        removeBtn.textContent = '− remove slot';
        removeBtn.onclick = () => removeSlot(di, proc);
        pcol.appendChild(removeBtn);
      }

      // Add slot button
      const addSlotBtn = document.createElement('button');
      addSlotBtn.className = 'add-slot-btn';
      addSlotBtn.textContent = '+ add slot';
      addSlotBtn.onclick = () => addSlot(di, proc);
      pcol.appendChild(addSlotBtn);

      grid.appendChild(pcol);
    });

    col.appendChild(grid);
    board.appendChild(col);
  });
}

function makeCard(id, job) {
  const card = document.createElement('div');
  card.className = 'job-card ' + job.process;
  card.draggable = true;
  const cname = document.createElement('div');
  cname.className = 'card-customer ' + job.process;
  cname.textContent = job.customer || '—';
  card.appendChild(cname);
  if (job.desc) { const d = document.createElement('div'); d.className = 'card-desc'; d.textContent = job.desc; card.appendChild(d); }
  if (job.color) { const c = document.createElement('div'); c.className = 'card-color'; c.textContent = job.color; card.appendChild(c); }
  const sb = document.createElement('button');
  sb.className = 'status-btn ' + (job.status || 'not-started');
  sb.textContent = STATUS_LABELS[job.status || 'not-started'];
  sb.onclick = e => { e.stopPropagation(); cycleStatus(id, job); };
  card.appendChild(sb);
  card.addEventListener('click', () => openModal(null, null, null, id));
  card.addEventListener('dragstart', () => { dragId = id; setTimeout(() => card.classList.add('dragging'), 0); });
  card.addEventListener('dragend', () => { dragId = null; card.classList.remove('dragging'); });
  return card;
}

function cycleStatus(id, job) { const i = STATUSES.indexOf(job.status||'not-started'); db.ref('jobs/'+id).update({status:STATUSES[(i+1)%STATUSES.length]}); }

function selectProcess(p) { selectedProcess = p; PROCESSES.forEach(proc => document.getElementById('opt-'+proc).classList.toggle('selected', proc===p)); }

function updateSlotOptions(day, proc, currentSlot) {
  const sel = document.getElementById('f-slot');
  const count = getSlotCount(parseInt(day), proc);
  sel.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = i + 1;
    if (i === currentSlot) opt.selected = true;
    sel.appendChild(opt);
  }
}

function openModal(day, proc, slot, id) {
  editingId = id || null;
  document.getElementById('modal-title').textContent = id ? 'Edit job' : 'Add job';
  document.getElementById('btn-del').style.display = id ? 'block' : 'none';
  const dayVal = id && jobs[id] ? jobs[id].day : (day !== null ? day : (currentDayOffset || 0));
  const procVal = id && jobs[id] ? jobs[id].process : (proc || 'coat');
  const slotVal = id && jobs[id] ? jobs[id].slot : (slot !== null ? slot : 0);

  if (id && jobs[id]) {
    const j = jobs[id];
    document.getElementById('f-customer').value = j.customer || '';
    document.getElementById('f-desc').value = j.desc || '';
    document.getElementById('f-color').value = j.color || '';
    document.getElementById('f-status').value = j.status || 'not-started';
    document.getElementById('f-day').value = j.day;
    selectProcess(j.process || 'coat');
  } else {
    document.getElementById('f-customer').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-color').value = '';
    document.getElementById('f-status').value = 'not-started';
    document.getElementById('f-day').value = dayVal;
    selectProcess(procVal);
  }

  updateSlotOptions(dayVal, procVal, slotVal);

  // Update slot options when day or process changes
  document.getElementById('f-day').onchange = function() { updateSlotOptions(this.value, selectedProcess, 0); };

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-customer').focus(), 100);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function overlayClick(e) { if (e.target===document.getElementById('modal-overlay')) closeModal(); }

function saveJob() {
  const customer = document.getElementById('f-customer').value.trim();
  if (!customer) { alert('Customer name is required.'); return; }
  const day = parseInt(document.getElementById('f-day').value);
  const slot = parseInt(document.getElementById('f-slot').value);
  const maxSlots = getSlotCount(day, selectedProcess);
  if (slot >= maxSlots) { alert('That slot doesn\'t exist. Please select a valid slot.'); return; }
  const job = { customer, desc: document.getElementById('f-desc').value.trim(), color: document.getElementById('f-color').value.trim(), process: selectedProcess, status: document.getElementById('f-status').value, day, slot, week: weekKey() };
  if (editingId) db.ref('jobs/'+editingId).update(job);
  else db.ref('jobs').push(job);
  closeModal();
}

function deleteJob() { if (editingId && confirm('Delete this job?')) { db.ref('jobs/'+editingId).remove(); closeModal(); } }

window.addEventListener('load', () => { const cfg = getConfig(); if (cfg && cfg.apiKey && cfg.databaseURL) initApp(cfg); else document.getElementById('setup-screen').style.display = 'block'; });
</script>
